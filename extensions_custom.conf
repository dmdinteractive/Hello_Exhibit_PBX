[from-internal-custom]

; ---- Extension 500 — Random PLAR Routing ----
; Visitor lifts handset → Grandstream dials 500
; Checks device state before dialing to avoid off-hook phones
; Retries up to 10 times to find an available phone
; Rings for 10 seconds, plays busy tone if no answer

exten => 500,1,NoOp(PLAR Random Dial initiated)
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(ATTEMPTS=0)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>10]?busy)
 same => n,Set(RAND_EXT=${RAND(101,112)})
 same => n,GotoIf($[${RAND_EXT}=${CALLING_EXT}]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Checking ${RAND_EXT} state: ${DEV_STATE})
 same => n,GotoIf($["${DEV_STATE}"="NOT_INUSE"]?dial)
 same => n,Goto(pick)
 same => n(dial),Dial(PJSIP/${RAND_EXT},10)
 same => n,GotoIf($["${DIALSTATUS}"="BUSY"]?pick)
 same => n,GotoIf($["${DIALSTATUS}"="UNAVAILABLE"]?pick)
 same => n(busy),Busy(5)
 same => n,Hangup()
 