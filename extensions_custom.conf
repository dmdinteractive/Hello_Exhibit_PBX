[from-internal-custom]

; ---- Extension 500 — Random PLAR Routing (exhibit phones only) ----
; Visitor lifts handset → Grandstream dials 500
; 75% chance of real phone (101-112)
; 25% chance of ghost extension (201-207)
; Rings 4 seconds per attempt
; Plays busy tone if no available phones found

exten => 500,1,NoOp(PLAR Random Dial initiated by ${CALLERID(num)})
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(ATTEMPTS=0)
 same => n,Set(TRIED=|)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>19]?busy)
 same => n,Set(WEIGHT=${RAND(1,4)})
 same => n,GotoIf($[${WEIGHT}=1]?pickghost)
 same => n(pickreal),Set(RAND_EXT=${RAND(101,112)})
 same => n,GotoIf($[${RAND_EXT}=${CALLING_EXT}]?pick)
 same => n,GotoIf($["${TRIED}" =~ "${RAND_EXT}"]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Trying real phone ${RAND_EXT} — State: ${DEV_STATE})
 same => n,GotoIf($["${DEV_STATE}"!="NOT_INUSE"]?skip)
 same => n,Dial(PJSIP/${RAND_EXT},4)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n,Goto(skip)
 same => n(pickghost),Set(RAND_EXT=${RAND(201,207)})
 same => n,GotoIf($["${TRIED}" =~ "${RAND_EXT}"]?pick)
 same => n,NoOp(Connecting to ghost extension ${RAND_EXT})
 same => n,Dial(Local/${RAND_EXT}@from-internal,4)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n(skip),Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,Goto(pick)
 same => n(busy),NoOp(No available phones found)
 same => n,Busy(5)
 same => n(done),Hangup()
 same => n,Hangup()

; ---- Extension 501 — Inbound ONLY Random Routing ----
; Used for external calls from 720-370-5529
; Only connects to real phones (101-112) — NO ghost extensions

exten => 501,1,NoOp(Inbound call routing initiated)
 same => n,Set(CALLING_EXT=inbound)
 same => n,Set(TOTAL_PHONES=12)
 same => n,Set(ATTEMPTS=0)
 same => n,Set(TRIED=|)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>${TOTAL_PHONES}]?busy)
 same => n,Set(RAND_EXT=${RAND(101,112)})
 same => n,GotoIf($["${TRIED}" =~ "${RAND_EXT}"]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Trying ${RAND_EXT} — State: ${DEV_STATE})
 same => n,GotoIf($["${DEV_STATE}"!="NOT_INUSE"]?skip)
 same => n,Dial(PJSIP/${RAND_EXT},4)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n,Goto(skip)
 same => n(skip),Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,Goto(pick)
 same => n(busy),NoOp(No available phones found — playing busy)
 same => n,Busy(5)
 same => n(done),Hangup()
 same => n,Hangup()
 