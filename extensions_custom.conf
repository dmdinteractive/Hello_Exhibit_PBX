[from-internal-custom]

; ---- Ring Group 500 — Random PLAR Routing ----
; Visitor lifts handset → Grandstream dials 500
; System picks a random available phone from the pool
; Rings for 5 seconds, plays busy tone if no answer

exten => 500,1,NoOp(PLAR Random Dial initiated)
 same => n,Set(EXTENSIONS=101&102&103&104&105&106&107&108&109&110&111&112)
 same => n,Set(TIMEOUT(response)=5)
 same => n,Dial(PJSIP/${SHUFFLE(${EXTENSIONS})},5,t)
 same => n,Busy(5)
 same => n,Hangup()