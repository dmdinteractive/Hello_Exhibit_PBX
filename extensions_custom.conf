[from-internal-custom]

; ---- Extension 500 — Random PLAR Routing ----
; Visitor lifts handset → Grandstream dials 500
; Retries up to 5 times if picked phone is busy or is the caller
; Rings for 5 seconds, plays busy tone if no answer

exten => 500,1,NoOp(PLAR Random Dial initiated)
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(ATTEMPTS=0)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>5]?busy)
 same => n,Set(RAND_EXT=${RAND(101,112)})
 same => n,GotoIf($[${RAND_EXT}=${CALLING_EXT}]?pick)
 same => n,Dial(PJSIP/${RAND_EXT},5)
 same => n,GotoIf($["${DIALSTATUS}"="BUSY"]?pick)
 same => n,GotoIf($["${DIALSTATUS}"="UNAVAILABLE"]?pick)
 same => n(busy),Busy(5)
 same => n,Hangup()