[from-internal-custom]

; ---- Extension 500 — Random PLAR Routing ----
; Visitor lifts handset → Grandstream dials 500
; Tries every phone before giving up
; Skips caller, off-hook, and in-use phones
; Rings 4 seconds per attempt (one full ring cycle)
; Plays busy tone if no available phones found

exten => 500,1,NoOp(PLAR Random Dial initiated by ${CALLERID(num)})
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(TOTAL_PHONES=12)
 same => n,Set(ATTEMPTS=0)
 same => n,Set(TRIED=|)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>${TOTAL_PHONES}]?busy)
 same => n,Set(RAND_EXT=${RAND(101,112)})
 same => n,GotoIf($[${RAND_EXT}=${CALLING_EXT}]?pick)
 same => n,GotoIf($["${TRIED}" =~ "${RAND_EXT}"]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Trying ${RAND_EXT} — State: ${DEV_STATE})
 same => n,GotoIf($["${DEV_STATE}"!="NOT_INUSE"]?skip)
 same => n,Dial(PJSIP/${RAND_EXT},4)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n(skip),Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,Goto(pick)
 same => n(busy),NoOp(No available phones found)
 same => n,Busy(5)
 same => n(done),Hangup()
 same => n,Hangup()