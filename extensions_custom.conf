; ============================================================
; Hello Exhibit — Custom Dialplan
; DMD Design / The Discovery Consortium
; Pull updates from GitHub and run: fwconsole reload
; ============================================================
[from-internal-custom]
; ---- Extension 500 — Random PLAR Routing (single connection) ----
; Visitor lifts handset → Grandstream dials 500
; 75% chance of real phone (101-131), 25% chance of ghost (201-207)
; Picks ONE available phone, rings it 30s, then busy. No re-roll after ringing starts.
exten => 500,1,NoOp(PLAR Single-Connection Dial by ${CALLERID(num)})
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(ATTEMPTS=0)
 same => n,Set(TRIED=|)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>50]?busy)
 same => n,Set(WEIGHT=${RAND(1,4)})
 same => n,GotoIf($[${WEIGHT}=1]?pickghost)
 ; ---- Real phone selection (loops here only until an available phone is found) ----
 same => n(pickreal),Set(RAND_EXT=${RAND(101,131)})
 same => n,GotoIf($[${RAND_EXT}=${CALLING_EXT}]?pick)
 same => n,GotoIf($["${TRIED}" =~ "|${RAND_EXT}|"]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Trying real phone ${RAND_EXT} — State: ${DEV_STATE})
 same => n,Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,GotoIf($["${DEV_STATE}"!="NOT_INUSE"]?pick)
 ; ---- Available phone found: ring it ONCE for 30s, no re-roll on timeout ----
 same => n,Dial(PJSIP/${RAND_EXT},30)
 same => n,Goto(done)
 ; ---- Ghost selection ----
 same => n(pickghost),Set(RAND_EXT=${RAND(201,207)})
 same => n,GotoIf($["${TRIED}" =~ "|${RAND_EXT}|"]?pick)
 same => n,Set(TRIED=${TRIED}${RAND_EXT}|)
 ; Skip ghosts that aren't actually defined in FreePBX, otherwise the caller
 ; hears "your call cannot be completed as dialed" instead of a recording.
 same => n,GotoIf($[${DIALPLAN_EXISTS(from-internal,${RAND_EXT},1)}=0]?pick)
 same => n,NoOp(Connecting to ghost extension ${RAND_EXT})
 same => n,Dial(Local/${RAND_EXT}@from-internal)
 same => n,Goto(done)
 same => n(busy),NoOp(No available phones found)
 same => n,Busy(5)
 same => n(done),Hangup()
 same => n,Hangup()
; ---- Extension 501 — Inbound ONLY (single connection) ----
; Used for external calls from 720-370-5529
; Only connects to real phones (101-131) — NO ghost extensions
; Picks ONE available phone, rings it 30s, then busy. No re-roll after ringing starts.
exten => 501,1,NoOp(Inbound Single-Connection routing initiated)
 same => n,Set(CALLING_EXT=inbound)
 same => n,Set(ATTEMPTS=0)
 same => n,Set(TRIED=|)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>50]?busy)
 same => n,Set(RAND_EXT=${RAND(101,131)})
 same => n,GotoIf($["${TRIED}" =~ "|${RAND_EXT}|"]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Trying ${RAND_EXT} — State: ${DEV_STATE})
 same => n,Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,GotoIf($["${DEV_STATE}"!="NOT_INUSE"]?pick)
 same => n,Dial(PJSIP/${RAND_EXT},30)
 same => n,Goto(done)
 same => n(busy),NoOp(No available phones found — playing busy)
 same => n,Busy(5)
 same => n(done),Hangup()
 same => n,Hangup()
; ---- Feature Code *73 — All-Call / Ring Every Phone ----
; Dialing *73 rings every physical phone (101-131) at the same time for 30s.
; The first handset lifted connects; the rest stop ringing. Caller's own
; extension is skipped so it doesn't ring itself.
; NOTE: *73 is FreePBX's default "Call Forward All Deactivate" code. If that
; built-in feature code is enabled it will win over this one. Disable or
; reassign it in Admin -> Feature Codes -> Call Forward (or pick another code).
exten => *73,1,NoOp(All-Call / Ring-All initiated by ${CALLERID(num)})
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(DIALSTR=)
 same => n,Set(EXT=101)
 same => n(build),GotoIf($[${EXT}>131]?dial)
 same => n,GotoIf($[${EXT}=${CALLING_EXT}]?skip)
 same => n,Set(DIALSTR=${DIALSTR}PJSIP/${EXT}&)
 same => n(skip),Set(EXT=$[${EXT}+1])
 same => n,Goto(build)
 same => n(dial),Set(DIALSTR=${DIALSTR:0:-1})
 same => n,GotoIf($["${DIALSTR}"=""]?nophones)
 same => n,NoOp(Ringing all phones: ${DIALSTR})
 same => n,Dial(${DIALSTR},30)
 same => n,Hangup()
 same => n(nophones),NoOp(No phones to ring)
 same => n,Busy(3)
 same => n,Hangup()
; ---- Feature Code *74 — Sequential Walk-Test ----
; Rings every physical phone (101-131) ONE AT A TIME, 20s each, so a single
; tech can walk the floor and confirm each handset rings. When the ringing
; phone is answered it speaks its own extension number ("one zero one") to the
; handset — confirming both the ring path and the speaker audio — then hangs up
; that phone and advances to the next. Unanswered/dead phones time out after
; 20s and the test moves on automatically. The tester's own extension is
; skipped. Dial *74 from any phone, leave it off-hook, and walk the floor.
; Adjust the 20 in the Dial() line if you need more/less walking time.
exten => *74,1,NoOp(Sequential Walk-Test initiated by ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(EXT=101)
 same => n(loop),GotoIf($[${EXT}>131]?done)
 same => n,GotoIf($[${EXT}=${CALLING_EXT}]?skip)
 same => n,NoOp(Ring-testing extension ${EXT})
 same => n,Dial(PJSIP/${EXT},20,U(ringtest-announce^s^1(${EXT})))
 same => n(skip),Set(EXT=$[${EXT}+1])
 same => n,Goto(loop)
 same => n(done),NoOp(Walk-test complete)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; ---- Sub-routine: announce the extension number to the answered handset ----
; Called via the U() option of Dial in *74. Runs on the CALLED channel (the
; phone that was just picked up). Speaks the digits, then returns CONTINUE so
; Asterisk hangs up this phone and resumes the *74 loop at the next extension.
[ringtest-announce]
exten => s,1,NoOp(Announcing extension ${ARG1} to answered handset)
 same => n,Wait(1)
 same => n,SayDigits(${ARG1})
 same => n,Wait(1)
 same => n,Set(GOSUB_RESULT=CONTINUE)
 same => n,Return()