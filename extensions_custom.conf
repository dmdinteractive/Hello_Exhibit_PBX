; Hello Exhibit — Custom Dialplan
; DMD Design / The Discovery Consortium
; Pull updates from GitHub and run: fwconsole reload
; ============================================================
[from-internal-custom]
; ---- Extension 500 — Random PLAR Routing (single connection) ----
; Visitor lifts handset → Grandstream dials 500
; 75% chance of real phone (101-131), 25% chance of ghost (201-207)
; Picks ONE available phone, rings it 30s, then busy. No re-roll after ringing starts.
exten => 500,1,NoOp(PLAR Single-Connection Dial by ${CALLERID(num)})
 same => n,Set(CALLING_EXT=${CALLERID(num)})
 same => n,Set(ATTEMPTS=0)
 same => n,Set(TRIED=|)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>50]?busy)
 same => n,Set(WEIGHT=${RAND(1,4)})
 same => n,GotoIf($[${WEIGHT}=1]?pickghost)
 ; ---- Real phone selection (loops here only until an available phone is found) ----
 same => n(pickreal),Set(RAND_EXT=${RAND(101,131)})
 same => n,GotoIf($[${RAND_EXT}=${CALLING_EXT}]?pick)
 same => n,GotoIf($["${TRIED}" =~ "|${RAND_EXT}|"]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Trying real phone ${RAND_EXT} — State: ${DEV_STATE})
 same => n,Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,GotoIf($["${DEV_STATE}"!="NOT_INUSE"]?pick)
 ; ---- Available phone found: ring it ONCE for 30s, no re-roll on timeout ----
 same => n,Dial(PJSIP/${RAND_EXT},30)
 same => n,Goto(done)
 ; ---- Ghost selection ----
 same => n(pickghost),Set(RAND_EXT=${RAND(201,207)})
 same => n,GotoIf($["${TRIED}" =~ "|${RAND_EXT}|"]?pick)
 same => n,Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,NoOp(Connecting to ghost extension ${RAND_EXT})
 same => n,Dial(Local/${RAND_EXT}@from-internal)
 same => n,Goto(done)
 same => n(busy),NoOp(No available phones found)
 same => n,Busy(5)
 same => n(done),Hangup()
 same => n,Hangup()
; ---- Extension 501 — Inbound ONLY (single connection) ----
; Used for external calls from 720-370-5529
; Only connects to real phones (101-131) — NO ghost extensions
; Picks ONE available phone, rings it 30s, then busy. No re-roll after ringing starts.
exten => 501,1,NoOp(Inbound Single-Connection routing initiated)
 same => n,Set(CALLING_EXT=inbound)
 same => n,Set(ATTEMPTS=0)
 same => n,Set(TRIED=|)
 same => n(pick),Set(ATTEMPTS=$[${ATTEMPTS}+1])
 same => n,GotoIf($[${ATTEMPTS}>50]?busy)
 same => n,Set(RAND_EXT=${RAND(101,131)})
 same => n,GotoIf($["${TRIED}" =~ "|${RAND_EXT}|"]?pick)
 same => n,Set(DEV_STATE=${DEVICE_STATE(PJSIP/${RAND_EXT})})
 same => n,NoOp(Trying ${RAND_EXT} — State: ${DEV_STATE})
 same => n,Set(TRIED=${TRIED}${RAND_EXT}|)
 same => n,GotoIf($["${DEV_STATE}"!="NOT_INUSE"]?pick)
 same => n,Dial(PJSIP/${RAND_EXT},30)
 same => n,Goto(done)
 same => n(busy),NoOp(No available phones found — playing busy)
 same => n,Busy(5)
 same => n(done),Hangup()
 same => n,Hangup()